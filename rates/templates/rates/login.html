{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход в систему</title>
    <link rel="stylesheet" href="{% static 'rates/css/bootstrap.min.css' %}">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white text-center">
                        <h4 class="mb-0">Вход в аккаунт</h4>
                    </div>
                    <div class="card-body">
                        <form method="post">
                            {% csrf_token %}
                            {% for field in form %}
                            <div class="mb-3">
                                <label class="form-label">{{ field.label }}</label>
                                {{ field }}
                            </div>
                            {% endfor %}
                            <button type="submit" class="btn btn-primary w-100 mt-2">Войти</button>
                        </form>
                        <hr>
                        <div class="text-center">
                            <a href="{% url 'rates:register' %}" class="small">Создать новый аккаунт</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
